<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Người Anh Thương ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink-dark: #ff4d6d; 
            --pink-hot: #ff0054;
            --pink-light: #ffdde1; 
            --glass: rgba(255, 255, 255, 0.4); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        
        body, html {
            min-height: 100vh; 
            font-family: 'Quicksand', sans-serif; 
            overflow: hidden;
            /* Tăng độ đậm màu sắc để mobile không bị nhạt */
            background: linear-gradient(-45deg, #ff758c, #ff7eb3, #fd3d64, #ffb7b7);
            background-size: 400% 400%; 
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        section { 
            display: none; 
            height: 100vh; 
            width: 100vw; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            text-align: center;
        }

        .active { display: flex; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Tối ưu khung cho Mobile */
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.5); 
            border-radius: 25px; 
            padding: 25px 15px; 
            width: 95%; 
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .my-photo-frame { 
            width: 200px; height: 200px; 
            margin: 0 auto 15px; 
            border: 4px solid white; 
            border-radius: 20px; 
            overflow: hidden; 
        }

        img { width: 100%; height: 100%; object-fit: cover; }

        /* Chữ tự gõ */
        .typing {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid var(--pink-dark);
            animation: caret 0.75s step-end infinite;
        }
        @keyframes caret { 50% { border-color: transparent; } }

        .btn { 
            background: var(--pink-hot); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 1.1em;
            cursor: pointer; 
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
        }

        #btn-no { background: #888; position: relative; transition: 0.2s; }

        .envelope-wrapper { width: 250px; height: 160px; position: relative; margin: 20px auto; }
        .envelope { width: 100%; height: 100%; background: #fff; border: 2px solid var(--pink-dark); border-radius: 10px; z-index: 2; position: relative;}
        .letter { 
            position: absolute; bottom: 0; left: 5%; width: 90%; 
            background: white; padding: 15px; border-radius: 5px; 
            z-index: 1; transition: 1s; opacity: 0;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .open .letter { transform: translateY(-100px); opacity: 1; }

        /* Page 4 Starfield */
        #page4 { background: #0b0e1a; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; }
        .scroll-photo { position: absolute; width: 120px; border: 4px solid white; animation: scrollUp var(--speed) linear infinite; }
    </style>
</head>
<body onclick="playMusic()">

    <audio id="bgMusic" loop>
        <source src="nhac-nen.mp3" type="audio/mpeg">
    </audio>

    <section id="page1" class="active">
        <h2 id="type1" class="typing" style="font-family: 'Dancing Script', cursive; font-size: 2.5em; color: white;"></h2>
        <div style="margin-top: 20px;">
            <input type="password" id="password" maxlength="4" placeholder="Nhập mã 1604..." 
                style="padding:15px; border-radius:15px; border:none; text-align:center; font-size: 1.2em; width: 200px; outline: none;">
        </div>
    </section>

    <section id="page2">
        <div class="glass-card">
            <div class="my-photo-frame"><img src="cuong.jpg"></div>
            <h2 id="type2" style="color: var(--pink-dark); font-family: 'Dancing Script', cursive; font-size: 2em; min-height: 40px;"></h2>
            <p style="margin: 15px 0; font-weight: bold;">Em có yêu anh nhiều thật nhiều không?</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn" onclick="nextPage(3)">CÓ Ạ ❤️</button>
                <button class="btn" id="btn-no" onmouseover="moveNo()" onclick="moveNo()">KHÔNG</button>
            </div>
        </div>
    </section>

    <section id="page3">
        <div id="cake-section">
            <h2 id="type3" style="color: white; font-family: 'Dancing Script', cursive; font-size: 2.2em; margin-bottom: 20px; min-height: 40px;"></h2>
            <div style="width:180px; height:180px; margin:0 auto; cursor:pointer;" onclick="openEnv()">
                <img src="banh.jpg" style="border-radius:20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
            </div>
            <p style="color: white; margin-top:20px; font-weight: bold;">Chạm vào bánh để mở thư nhé!</p>
        </div>

        <div id="envelope-section" style="display:none;">
            <div class="envelope-wrapper" id="env" onclick="this.classList.add('open'); showBtn();">
                <div class="envelope" style="display: flex; justify-content: center; align-items: center; font-size: 2em;">✉️</div>
                <div class="letter">
                    <p style="color: var(--pink-dark); font-weight: bold;">Gửi GiaKyiuu,</p>
                    <p style="font-size: 0.9em; margin-top: 5px;">Chúc mừng sinh nhật công chúa của anh! Mãi yêu em ❤️</p>
                </div>
            </div>
            <button id="btn-final" class="btn" style="display:none; margin-top:120px;" onclick="nextPage(4)">Điều bất ngờ cuối cùng</button>
        </div>
    </section>

    <section id="page4">
        <div style="color:white; z-index:100;">
            <h1 id="type4" style="font-family: 'Dancing Script', cursive; font-size: 2.5em;"></h1>
            <p>Mãi bên nhau nhé ❤️</p>
        </div>
        <div id="star-field"></div>
    </section>

    <script>
        const music = document.getElementById('bgMusic');
        
        // Hàm hiệu ứng gõ chữ
        function typeWriter(id, text, speed = 100) {
            let i = 0;
            const el = document.getElementById(id);
            el.innerHTML = "";
            el.style.width = "auto";
            function type() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    el.style.borderRight = "none"; // Gõ xong thì mất con trỏ
                }
            }
            type();
        }

        // Khởi động trang 1
        window.onload = () => {
            typeWriter("type1", "Lối vào trái tim...");
        };

        function playMusic() { music.play().catch(e => {}); }

        document.getElementById('password').oninput = function() {
            if(this.value === "1604") {
                playMusic();
                nextPage(2);
            }
        };

        function nextPage(n) {
            playMusic();
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById('page'+n).classList.add('active');
            
            if(n === 2) setTimeout(() => typeWriter("type2", "Chào em..."), 500);
            if(n === 3) setTimeout(() => typeWriter("type3", "Happy Birthday!"), 500);
            if(n === 4) {
                setTimeout(() => typeWriter("type4", "Ngủ ngon nhé bé yêu!"), 500);
                initGalaxy();
            }
        }

        function openEnv() {
            document.getElementById('cake-section').style.display = 'none';
            document.getElementById('envelope-section').style.display = 'flex';
        }

        function showBtn() { setTimeout(() => document.getElementById('btn-final').style.display = 'block', 1000); }

        function moveNo() {
            const b = document.getElementById('btn-no');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            b.style.position = 'fixed';
            b.style.left = x + 'px';
            b.style.top = y + 'px';
        }

        // Tim và bóng bay rơi
        setInterval(() => {
            const el = document.createElement('div');
            el.innerHTML = Math.random() > 0.5 ? '❤️' : '🎈';
            el.style.position = 'fixed';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = '-50px';
            el.style.fontSize = Math.random() * 20 + 15 + 'px';
            el.style.zIndex = '1';
            el.style.transition = '4s linear';
            document.body.appendChild(el);
            setTimeout(() => {
                el.style.transform = 'translateY(110vh)';
                setTimeout(() => el.remove(), 4000);
            }, 100);
        }, 400);

        function initGalaxy() {
            const field = document.getElementById('star-field');
            for(let i=0; i<60; i++) { // Giảm số lượng star cho nhẹ mobile
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 3 + 1 + 'px';
                s.style.width = s.style.height = size;
                s.style.left = Math.random() * 100 + 'vw';
                s.style.top = Math.random() * 100 + 'vh';
                field.appendChild(s);
            }
            const contents = [
                {type:'img', val:'anh1.jpeg'}, {type:'text', val:'Yêu em'},
                {type:'img', val:'anh2.jpeg'}, {type:'text', val:'Thương em'},
                {type:'img', val:'anh3.jpeg'}, {type:'text', val:'Xinh nhất!'}
            ];
            contents.forEach((item, i) => {
                const el = document.createElement(item.type === 'img' ? 'img' : 'div');
                if(item.type === 'img') el.src = item.val; else el.innerText = item.val;
                el.className = item.type === 'img' ? 'scroll-photo' : 'floating-text';
                el.style.left = (Math.random() * 60 + 10) + 'vw';
                el.style.color = 'white';
                el.style.position = 'absolute';
                el.style.setProperty('--speed', (Math.random() * 3 + 6) + 's');
                el.style.animationDelay = (i * 2) + 's';
                field.appendChild(el);
            });
        }
    </script>
</body>
</html>
