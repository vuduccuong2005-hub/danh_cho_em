<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Người Anh Thương ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink-dark: #ff4d6d; 
            --pink-hot: #ff0054;
            --pink-light: #ffdde1; 
            --glass: rgba(255, 255, 255, 0.4); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        
        body, html {
            min-height: 100vh; font-family: 'Quicksand', sans-serif; overflow: hidden;
            background: linear-gradient(-45deg, #ff758c, #ff7eb3, #fd3d64, #ffb7b7);
            background-size: 400% 400%; animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        section { display: none; height: 100vh; width: 100vw; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; position: relative; }
        .active { display: flex; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card { 
            background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.5); border-radius: 25px; 
            padding: 25px 15px; width: 95%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .my-photo-frame { width: 200px; height: 200px; margin: 0 auto 15px; border: 4px solid white; border-radius: 20px; overflow: hidden; }
        img { width: 100%; height: 100%; object-fit: cover; }

        .typing { display: inline-block; overflow: hidden; white-space: nowrap; border-right: 3px solid var(--pink-dark); animation: caret 0.75s step-end infinite; }
        @keyframes caret { 50% { border-color: transparent; } }

        .btn { 
            background: var(--pink-hot); color: white; border: none; padding: 15px 30px; border-radius: 50px; 
            font-weight: bold; font-size: 1.1em; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #btn-no { background: #888; position: relative; }

        /* PHẦN PHONG BÌ ĐÃ FIX */
        .envelope-wrapper { width: 250px; height: 150px; position: relative; margin: 50px auto 20px; perspective: 1000px; }
        .envelope { 
            width: 100%; height: 100%; background: white; border: 2px solid var(--pink-dark); 
            border-radius: 10px; position: absolute; z-index: 1; /* Để lớp thấp nhất */
            display: flex; justify-content: center; align-items: center; font-size: 3em;
        }
        .letter { 
            position: absolute; bottom: 0; left: 5%; width: 90%; 
            background: #fffafa; padding: 15px; border-radius: 5px; 
            z-index: 10; /* Đẩy lá thư lên trên cùng */
            transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            opacity: 0; transform: translateY(0);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            border-top: 3px solid var(--pink-dark);
        }
        .open .letter { transform: translateY(-130px); opacity: 1; }

        /* HIỆU ỨNG TRÔI ẢNH TRANG CUỐI */
        #page4 { background: #0b0e1a; overflow: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; }
        
        .scroll-item { 
            position: absolute; 
            bottom: -300px; 
            animation: scrollUp var(--speed) linear infinite; 
            z-index: 5;
        }
        .scroll-photo { width: 130px; border: 5px solid white; border-radius: 10px; }
        .floating-text { 
            color: white; font-family: 'Dancing Script', cursive; 
            font-size: 1.5em; text-shadow: 0 0 10px var(--pink-dark);
            white-space: nowrap;
        }

        @keyframes scrollUp {
            from { transform: translateY(0); }
            to { transform: translateY(-130vh); }
        }
    </style>
</head>
<body onclick="playMusic()">

    <audio id="bgMusic" loop>
        <source src="nhac-nen.mp3" type="audio/mpeg">
    </audio>

    <section id="page1" class="active">
        <h2 id="type1" class="typing" style="font-family: 'Dancing Script', cursive; font-size: 2.5em; color: white;"></h2>
        <div style="margin-top: 20px;">
            <input type="password" id="password" maxlength="4" placeholder="Nhập mã 1604..." 
                style="padding:15px; border-radius:15px; border:none; text-align:center; font-size: 1.2em; width: 220px;">
        </div>
    </section>

    <section id="page2">
        <div class="glass-card">
            <div class="my-photo-frame"><img src="cuong.jpg"></div>
            <h2 id="type2" style="color: var(--pink-dark); font-family: 'Dancing Script', cursive; font-size: 2em; min-height: 45px;"></h2>
            <p style="margin: 15px 0; font-weight: bold;">Em có yêu anh nhiều thật nhiều không?</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn" onclick="nextPage(3)">CÓ Ạ ❤️</button>
                <button class="btn" id="btn-no" onmouseover="moveNo()" onclick="moveNo()">KHÔNG</button>
            </div>
        </div>
    </section>

    <section id="page3">
        <div id="cake-section">
            <h2 id="type3" style="color: white; font-family: 'Dancing Script', cursive; font-size: 2.2em; margin-bottom: 20px; min-height: 45px;"></h2>
            <div style="width:180px; height:180px; margin:0 auto; cursor:pointer;" onclick="openEnv()">
                <img src="banh.jpg" style="border-radius:20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
            </div>
            <p style="color: white; margin-top:20px; font-weight: bold;">Chạm vào bánh để mở thư nhé!</p>
        </div>

        <div id="envelope-section" style="display:none;">
            <div class="envelope-wrapper" id="env" onclick="this.classList.add('open'); showBtn();">
                <div class="envelope">✉️</div>
                <div class="letter">
                    <p style="color: var(--pink-dark); font-weight: bold; font-size: 1.1em;">Gửi GiaKyiuu ❤️</p>
                    <p style="font-size: 0.9em; margin-top: 8px; color: #333; line-height: 1.4;">Chúc mừng sinh nhật công chúa của anh! Chúc em luôn xinh đẹp, hạnh phúc và mãi ở bên cạnh anh nhé. Yêu em nhất trên đời!</p>
                </div>
            </div>
            <button id="btn-final" class="btn" style="display:none; margin-top:140px;" onclick="nextPage(4)">Điều cuối cùng...</button>
        </div>
    </section>

    <section id="page4">
        <div style="color:white; z-index:100; position: relative;">
            <h1 id="type4" style="font-family: 'Dancing Script', cursive; font-size: 2.5em; text-shadow: 0 5px 15px rgba(0,0,0,0.5);"></h1>
            <p style="font-size: 1.2em;">Mãi bên nhau nhé ❤️</p>
        </div>
        <div id="star-field"></div>
    </section>

    <script>
        const music = document.getElementById('bgMusic');
        function playMusic() { music.play().catch(e => {}); }

        function typeWriter(id, text, speed = 80) {
            let i = 0; const el = document.getElementById(id);
            el.innerHTML = "";
            function type() {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, speed); }
            }
            type();
        }

        window.onload = () => { typeWriter("type1", "Lối vào trái tim..."); };

        document.getElementById('password').oninput = function() {
            if(this.value === "1604") { playMusic(); nextPage(2); }
        };

        function nextPage(n) {
            playMusic();
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById('page'+n).classList.add('active');
            if(n === 2) setTimeout(() => typeWriter("type2", "Chào em..."), 300);
            if(n === 3) setTimeout(() => typeWriter("type3", "Happy Birthday!"), 300);
            if(n === 4) { setTimeout(() => typeWriter("type4", "Ngủ ngon nhé bé yêu!"), 300); initGalaxy(); }
        }

        function openEnv() {
            document.getElementById('cake-section').style.display = 'none';
            document.getElementById('envelope-section').style.display = 'flex';
        }

        function showBtn() { setTimeout(() => document.getElementById('btn-final').style.display = 'block', 1200); }

        function moveNo() {
            const b = document.getElementById('btn-no');
            b.style.position = 'fixed';
            b.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            b.style.top = Math.random() * (window.innerHeight - 50) + 'px';
        }

        // Tạo tim rơi
        setInterval(() => {
            const el = document.createElement('div');
            el.innerHTML = '❤️';
            el.style.position = 'fixed';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = '-50px';
            el.style.fontSize = Math.random() * 20 + 10 + 'px';
            el.style.transition = '5s linear';
            el.style.zIndex = '1';
            document.body.appendChild(el);
            setTimeout(() => { el.style.transform = 'translateY(110vh)'; setTimeout(() => el.remove(), 5000); }, 100);
        }, 500);

        function initGalaxy() {
            const field = document.getElementById('star-field');
            for(let i=0; i<50; i++) {
                const s = document.createElement('div'); s.className = 'star';
                const size = Math.random() * 3 + 1 + 'px';
                s.style.width = s.style.height = size;
                s.style.left = Math.random() * 100 + 'vw'; s.style.top = Math.random() * 100 + 'vh';
                field.appendChild(s);
            }
            const items = [
                {type:'img', val:'anh1.jpeg'}, {type:'text', val:'Em là duy nhất'},
                {type:'img', val:'anh2.jpeg'}, {type:'text', val:'Thương em lắm'},
                {type:'img', val:'anh3.jpeg'}, {type:'text', val:'Xinh đẹp nhất'},
                {type:'img', val:'anh4.jpeg'}, {type:'text', val:'I Love You'},
                {type:'img', val:'anh12.jpeg'}, {type:'text', val:'Bé yêu'}
            ];
            items.forEach((item, i) => {
                const container = document.createElement('div');
                container.className = 'scroll-item';
                const el = document.createElement(item.type === 'img' ? 'img' : 'div');
                if(item.type === 'img') el.src = item.val; else el.innerText = item.val;
                el.className = item.type === 'img' ? 'scroll-photo' : 'floating-text';
                container.appendChild(el);
                container.style.left = (Math.random() * 70 + 5) + 'vw';
                container.style.setProperty('--speed', (Math.random() * 3 + 7) + 's');
                container.style.animationDelay = (i * 1.5) + 's';
                field.appendChild(container);
            });
        }
    </script>
</body>
</html>
