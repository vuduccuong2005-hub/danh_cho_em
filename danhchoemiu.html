<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Người Anh Thương ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --pink-dark: #ff4d6d; --pink-light: #ffdde1; --glass: rgba(255, 255, 255, 0.25); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            min-height: 100vh; font-family: 'Quicksand', sans-serif; overflow: hidden;
            background: linear-gradient(-45deg, #ffafbd, #ffc3a0, #ee9ca7, #ffdde1);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        img { width: 100%; height: 100%; object-fit: cover; }
        .falling-element { position: fixed; color: white; opacity: 0.7; z-index: 100; animation: fall linear infinite; pointer-events: none; }
        @keyframes fall { 0% { transform: translateY(-10vh); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(110vh); opacity: 0; } }
        section { display: none; height: 100vh; width: 100vw; flex-direction: column; justify-content: center; align-items: center; position: relative; z-index: 10; }
        .active { display: flex; animation: zoomIn 0.6s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.3); border-radius: 30px; padding: 30px; text-align: center; width: 90%; max-width: 400px; }
        .my-photo-frame { width: 250px; height: 250px; margin: 0 auto 10px; border: 5px solid white; border-radius: 20px; overflow: hidden; }
        .envelope-wrapper { width: 280px; height: 180px; position: relative; cursor: pointer; margin-top: 20px; perspective: 1000px; }
        .envelope { width: 100%; height: 100%; background: var(--pink-light); border: 2px solid #ff85a1; border-radius: 10px; position: relative; z-index: 2; }
        .flap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--pink-light); border: 2px solid #ff85a1; clip-path: polygon(0 0, 100% 0, 50% 100%); transform-origin: top; transition: 0.6s; z-index: 3; }
        .open .flap { transform: rotateX(180deg); z-index: 1; }
        .letter { position: absolute; bottom: 10px; left: 5%; width: 90%; height: 180px; background: white; padding: 15px; border-radius: 5px; transition: 0.8s 0.5s; z-index: 2; opacity: 0; text-align: left; font-size: 0.9em; }
        .open .letter { transform: translateY(-110px); opacity: 1; }
        #page4 { background: #050a18; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 0.8s infinite alternate; }
        @keyframes twinkle { from { opacity: 0.3; transform: scale(0.8); } to { opacity: 1; transform: scale(1.3); } }
        .scroll-photo { position: absolute; bottom: -400px; width: 150px; height: 210px; border: 5px solid white; animation: scrollUp var(--speed) linear infinite; }
        .floating-text { position: absolute; color: white; font-family: 'Dancing Script', cursive; font-size: 1.6em; animation: scrollUp var(--speed) linear infinite; text-shadow: 0 0 10px var(--pink-dark); }
        @keyframes scrollUp { from { bottom: -400px; } to { bottom: 120%; } }
        .btn { background: var(--pink-dark); color: white; border: none; padding: 12px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onclick="playMusic()"> 
    <audio id="bgMusic" loop>
        <source src="nhac-nen.mp3" type="audio/mpeg">
    </audio>

    <section id="page1" class="active">
        <h2 style="font-family: 'Dancing Script', cursive; font-size: 3em; color: white; margin-bottom: 10px;">Lối vào trái tim</h2>
        <input type="password" id="password" maxlength="4" placeholder="Mật khẩu" oninput="checkPass()" style="padding:10px; border-radius:10px; border:none; text-align:center;">
    </section>

    <section id="page2">
        <div class="glass-card">
            <div class="my-photo-frame"><img src="cuong.jpg"></div>
            <h2 style="color: var(--pink-dark); font-family: 'Dancing Script', cursive; font-size: 2.2em;">Chào em...</h2>
            <p style="margin-bottom:15px;">Em có yêu anh nhiều thật nhiều không?</p>
            <button class="btn" onclick="nextPage(3)">CÓ Ạ ❤️</button>
            <button class="btn" id="btn-no" onmouseover="moveNo()" style="background:#888; margin-left:10px;">KHÔNG</button>
        </div>
    </section>

    <section id="page3">
        <div id="cake-section" style="text-align:center;">
            <h2 style="color: white; font-family: 'Dancing Script', cursive; font-size: 2.5em; margin-bottom: 20px;">Chúc Mừng Sinh Nhật!</h2>
            <div style="width:200px; height:200px; margin:0 auto; cursor:pointer;" onclick="openEnv()">
                <img src="banh.jpg" style="border-radius:20px;">
            </div>
            <p style="color: white; margin-top:15px;">Chạm vào bánh để mở thư nhé!</p>
        </div>
        <div id="envelope-section" style="display:none; flex-direction:column; align-items:center;">
            <div class="envelope-wrapper" id="env" onclick="this.classList.add('open'); showBtn(); playMusic();">
                <div class="flap"></div><div class="envelope"></div>
                <div style="position:absolute; top:75px; left:50%; transform:translateX(-50%); z-index:4;">❤️</div>
                <div class="letter">
                    <h3 style="color: var(--pink-dark); margin-bottom: 10px;">Gửi em,</h3>
                    <p>Chúc GiaKyiuu sinh nhật vui vẻ nhóoo. Mãi yêu em!</p>
                </div>
            </div>
            <button id="btn-final" class="btn" style="display:none; margin-top:140px;" onclick="nextPage(4)">Điều bất ngờ cuối cùng</button>
        </div>
    </section>

    <section id="page4">
        <div style="color:white; z-index:100; text-align:center; position:relative;">
            <h1 style="font-family: 'Dancing Script', cursive; font-size: 3.5em;">Ngủ ngon nhé bé yêu!</h1>
            <p>Mãi yêu ❤️</p>
        </div>
        <div id="star-field"></div>
    </section>

    <script>
        var music = document.getElementById('bgMusic');
        function playMusic() { music.play().catch(e => console.log("Chờ tương tác...")); }
        function checkPass() { if(document.getElementById('password').value === "1604") { playMusic(); nextPage(2); } }
        function nextPage(n) { playMusic(); document.querySelectorAll('section').forEach(s => s.classList.remove('active')); document.getElementById('page'+n).classList.add('active'); if(n === 4) initGalaxy(); }
        function openEnv() { playMusic(); document.getElementById('cake-section').style.display = 'none'; document.getElementById('envelope-section').style.display = 'flex'; }
        function showBtn() { setTimeout(() => { document.getElementById('btn-final').style.display = 'block'; }, 1500); }
        function moveNo() { const b = document.getElementById('btn-no'); b.style.position = 'fixed'; b.style.left = Math.random() * 80 + 'vw'; b.style.top = Math.random() * 80 + 'vh'; }
        
        setInterval(() => {
            const el = document.createElement('div');
            el.className = 'falling-element';
            el.innerHTML = Math.random() > 0.5 ? '❤️' : '🎈';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 20 + 15) + 'px';
            el.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }, 300);

        function initGalaxy() {
            const field = document.getElementById('star-field');
            for(let i=0; i<100; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = (Math.random() * 5 + 3) + 'px';
                s.style.width = s.style.height = size;
                s.style.left = Math.random() * 100 + 'vw';
                s.style.top = Math.random() * 100 + 'vh';
                field.appendChild(s);
            }
            // ĐÃ KIỂM TRA: Toàn bộ ảnh này đều là .jpeg như trong thư mục
            const contents = [
                {type:'text', val:'Em là duy nhất'}, {type:'img', val:'anh1.jpeg'},
                {type:'text', val:'Yêu em nhiều lắm'}, {type:'img', val:'anh2.jpeg'},
                {type:'text', val:'Bé của anh'}, {type:'img', val:'anh3.jpeg'},
                {type:'text', val:'Mãi bên nhau nhé'}, {type:'img', val:'anh4.jpeg'},
                {type:'text', val:'Công chúa của anh'}, {type:'img', val:'anh5.jpeg'},
                {type:'text', val:'I Love You'}, {type:'img', val:'anh6.jpeg'},
                {type:'text', val:'Thương em'}, {type:'img', val:'anh11.jpeg'},
                {type:'text', val:'Xinh đẹp quá đi'}, {type:'img', val:'anh12.jpeg'},
                {type:'text', val:'Moazzz'}, {type:'img', val:'anh13.jpeg'}
            ];
            contents.forEach((item, i) => {
                const el = document.createElement(item.type === 'img' ? 'img' : 'div');
                if(item.type === 'img') el.src = item.val; else el.innerText = item.val;
                el.className = item.type === 'img' ? 'scroll-photo' : 'floating-text';
                el.style.left = (Math.random() * 70 + 10) + 'vw';
                el.style.setProperty('--speed', (Math.random() * 2 + 5) + 's');
                el.style.animationDelay = (i * 1.2) + 's';
                field.appendChild(el);
            });
        }
    </script>
</body>
</html>
